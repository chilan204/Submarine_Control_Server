spring:
  application:
    name: Submarine_Control_Server

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: ${DDL_AUTO:update}

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 5s

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.springframework.security: ${LOG_SECURITY:INFO}
    org.springframework.web: ${LOG_WEB:INFO}
    com.example.submarine_control_server: ${LOG_APP:DEBUG}
    org.hibernate.SQL: ${LOG_SQL:OFF}
    org.springframework.data.redis: DEBUG
    io.lettuce.core: DEBUG

application:
  jwt:
    secretKey: ${JWT_SECRET}
    accessExpiration: ${JWT_ACCESS_EXP}
    refreshExpiration: ${JWT_REFRESH_EXP}

app:
  ai:
    url: ${AI_URL:http://127.0.0.1:5000}
    timeout-seconds: ${AI_TIMEOUT:120}

  init:
    admin:
      username: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin}
      email: ${ADMIN_EMAIL:admin@example.com}
      name: ${ADMIN_NAME:Administrator}
      phone: ${ADMIN_PHONE:000000000}